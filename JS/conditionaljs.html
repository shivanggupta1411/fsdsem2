<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
</head>
<body>
    <script>
        // conditional statement : allow code to make decision and run different blocks of code based on whether condition is true or false

        //if.condition.....

        //age validation for voting

        let age=23;
        if(age>=18){
            console.log(age + " is valid age for vote casting");
        }


        //if else condition
        let myage=20;
        if (myage<18){
            console.log( "not valid age for vote casting");
        }
        else{
            console.log( "valid age for vote casting");
        }

        //switch .....
        let grade="A";
        switch(grade){
            case "A": result="first division";
                break;
            case "B": result="second division";
                break;
            case "C": result="third division";
                break;
            default: result="fail";
        }
        console.log(result);

        //if else if else .....

        let marks=65;
        if(marks>=60){
            console.log("first grade");
        }
        else if(marks<60 && marks>=40){
            console.log("second grade");
        }
        else if(marks<40 && marks>=33){
            console.log("third grade");
        }
        else{
            console.log("fail");
        }
    </script>
</body>
</html>
