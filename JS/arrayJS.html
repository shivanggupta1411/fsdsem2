<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRAY IN JS</title>
</head>
<body>
    <script>
        //array is a collection of any data ttype
        let num=[3,4,2,5,6,7,8,9,6,5];

        console.log(num.lastIndexOf(5));
        console.log("length"+num.length);
        console.log(num.pop());
        console.log("updated"+num);
        console.log(num.push(99));
        console.log("updated"+num);

        //shift and unnshift
        //shift: 

        console.log(num.shift());
        console.log(`updated shift ${num}`);

        // unshift

        console.log(num.unshift())


    </script>
    
</body>
</html>
