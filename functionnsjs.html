    <script>
        //function: block of code used or designed to perform a specific particular task
        //Types of function:
        // normal function : - with parameter , without parameter and with default

        // normal function without parameter
        function demo()
        {
            console.log("Hello world");
        }
        demo();

        //with parameter
        function demo1(text){
            console.log("Hello " + text);
        }
        demo1("Alice");

        //with default parameter
        function add(a,b=12){
            console.log("addition is " + (a+b));
        }
        add(125,23);
        add(125);
        // snchronous function : - function which execute line by line

        function cal(){
            function add(a,b){
                console.log("addition is " + (a+b));
            }
            function sub(a,b){
                console.log("subtraction is " + (a-b));
            }
            function mul(a,b){
                console.log("multiplication is " + (a*b));
            }
            add(12,23);
            sub(12,23);
            mul(12,23);
        }

        cal();
        // anonymous function : - function without name
        let msg = function(){
            console.log("Hello abes");
            //console.log(typeof (msg));
        }
        msg();

        //short code for anonymous function is arrow function
        let msg1 = () => console.log("Hello abesec");
        msg1();

        let msg2=(a,b)=>{
            var num1=a;
            var num2=b;
            var res=num1/num2;
            console.log("division is " + res);
        }
        msg2(20,4);

        //IIFE:-mmediately Invoked Function Expressions (IIFE) are JavaScript functions that are executed immediately after they are defined. They are typically used to create a local scope for variables to prevent them from polluting the global scope.
        (function(){

        })();
